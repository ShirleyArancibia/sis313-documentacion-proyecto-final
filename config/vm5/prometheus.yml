global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - '192.168.0.111:9100'
          - '192.168.0.113:9100'
          - '192.168.0.114:9100'
          - '192.168.0.120:9100'
          - '192.168.0.122:9100'
